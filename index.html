<!DOCTYPE html>
<html>
  <head>
    <script
      src="https://kit.fontawesome.com/96fa2aa3c8.js"
      crossorigin="anonymous"
    ></script>
    <title>City Skyline</title>
    <link href="styles.css" rel="stylesheet" type="text/css" />
  </head>
  <body>
    <p id="night">
      <i class="fa-solid fa-arrow-left-long"></i>
      For <span id="nightime-text">nightime</span>, shrink screen
    </p>
    <p id="day">
      For <span id="daytime-text">daytime</span>, expand screen
      <i class="fa-solid fa-arrow-right-long"></i>
    </p>
    <div class="background-buildings sky">
      <!--Building group container -->
      <div><!-- for flexbox: space evenly property purposes --></div>
      <div></div>
      <div class="bb1 building-wrap">
        <!-- background building #1 -->
        <div class="bb1a bb1-window"></div>
        <div class="bb1b bb1-window"></div>
        <div class="bb1c bb1-window"></div>
        <div class="bb1d"></div>
      </div>
      <div class="bb2">
        <!-- background building #2 -->
        <div class="bb2a"></div>
        <div class="bb2b"></div>
      </div>
      <div class="bb3"></div>
      <!-- background building #3 -->
      <div></div>
      <div class="bb4 building-wrap">
        <!-- background building #4 -->
        <div class="bb4a"></div>
        <div class="bb4b"></div>
        <div class="bb4c window-wrap">
          <div class="bb4-window"></div>
          <div class="bb4-window"></div>
          <div class="bb4-window"></div>
          <div class="bb4-window"></div>
        </div>
      </div>
      <div></div>
      <div></div>
    </div>
    <div class="foreground-buildings">
      <!--Background buildings-->
      <div><!-- for flexbox: space evenly property purposes --></div>
      <div></div>
      <div class="fb1 building-wrap">
        <div class="fb1a"></div>
        <div class="fb1b"></div>
        <div class="fb1c"></div>
      </div>
      <div class="fb2">
        <div class="fb2a"></div>
        <div class="fb2b window-wrap">
          <div class="fb2-window"></div>
          <div class="fb2-window"></div>
          <div class="fb2-window"></div>
        </div>
      </div>
      <div></div>
      <div class="fb3 building-wrap">
        <div class="fb3a window-wrap">
          <div class="fb3-window"></div>
          <div class="fb3-window"></div>
          <div class="fb3-window"></div>
        </div>
        <div class="fb3b"></div>
        <div class="fb3a"></div>
        <div class="fb3b"></div>
      </div>
      <div class="fb4">
        <div class="fb4a"></div>
        <div class="fb4b">
          <div class="fb4-window"></div>
          <div class="fb4-window"></div>
          <div class="fb4-window"></div>
          <div class="fb4-window"></div>
          <div class="fb4-window"></div>
          <div class="fb4-window"></div>
        </div>
      </div>
      <div class="fb5"></div>
      <div class="fb6"></div>
      <div></div>
      <div></div>
    </div>
  </body>
</html>
